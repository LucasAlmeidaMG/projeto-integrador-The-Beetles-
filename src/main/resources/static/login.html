<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Beetles</title>
    <link rel="preload" as="image" href="elements/logo-beetles.png">
    <link rel="preload" as="image" href="elements/lgn-bg.jpg">
    <link rel="preload" as="image" href="elements/logo-instagram.png">
    <link rel="preload" as="image" href="elements/logo-whatsapp.png">
    
    <link rel="stylesheet" href="css/login/style.css">
    
</head>

<body>
    <header id="abatopo">
        <a href="index.html">
            <img src="elements/logo-beetles.png" alt="Logo da Academia">
        </a>
    </header>
    <div id="container">
        <section id="card-login">
            <h2>Login</h2>
            <form>
                <p>Email:</p>
                <input type="text" id="inEmail">
                <p>Senha:</p>
                <input type="password" id="inSenha">
                <input type="submit" value="Login" id="btnLogin">
            </form>
        </section>

        <section id="contatos">
            <p id="instRegistro">Problemas no login?<br>Entre em contato:</p>
            <a id="btnInstagram" href="#" target="_blank" rel="noopener" aria-label="Instagram">
                <img id="logoInstagram" src="elements/logo-instagram.png" alt="Instagram">
            </a>
            <a id="btnWhatsapp" href="#" target="_blank" rel="noopener" aria-label="WhatsApp">
                <img id="logoWhatsapp" src="elements/logo-whatsapp.png" alt="WhatsApp">
            </a>
        </section>

    </div>
    <footer>
        <p>© The Beetles - 2026 - Todos os direitos reservados</p>
    </footer>
    <script src="js/api.js"></script>
    <script src="js/login.js"></script>
</body>

</html>
